<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROAD KINGS 10</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:black;color:white;overflow-x:hidden;}

/* LOADER */
#loader{
position:fixed;width:100%;height:100%;background:black;
display:flex;justify-content:center;align-items:center;
z-index:9999;font-size:2em;color:cyan;
animation:fadeOut 2s forwards;animation-delay:2s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

/* FONDO */
body::before{
content:"";position:fixed;width:100%;height:100%;
background:url('bg.jpg') center/cover no-repeat;
opacity:0.2;z-index:-2;
}

/* PARTÍCULAS */
canvas{position:fixed;top:0;left:0;z-index:-1;}

/* HEADER */
header{text-align:center;padding:30px;}
header img{width:90%;max-width:700px;filter:drop-shadow(0 0 25px cyan);}

/* HERO */
.hero{text-align:center;padding:60px;}
.hero h1{font-size:3em;animation:glow 2s infinite alternate;}
@keyframes glow{
from{text-shadow:0 0 10px cyan;}
to{text-shadow:0 0 35px magenta;}
}

/* BOTONES */
.btn{
display:inline-block;margin:10px;padding:15px 30px;
border-radius:10px;font-weight:bold;text-decoration:none;
transition:.3s;cursor:pointer;
}
.discord{background:#5865F2;}
.discord:hover{box-shadow:0 0 20px #5865F2;transform:scale(1.1);}
.telegram{background:linear-gradient(45deg,#0088cc,#00c6ff);}
.telegram:hover{box-shadow:0 0 20px #00c6ff;transform:scale(1.1);}
.donar{background:linear-gradient(45deg,green,lime);}
.donar:hover{box-shadow:0 0 20px lime;}

/* LOGIN */
.login-box{
text-align:center;padding:30px;
}
.login-box input{
padding:10px;margin:5px;border:none;border-radius:5px;
}
#userPanel{display:none;}

/* CHAT */
.chat{
position:fixed;bottom:10px;right:10px;
width:300px;background:#111;border:1px solid cyan;
border-radius:10px;
}
.chat-messages{
height:200px;overflow-y:auto;padding:10px;
}
.chat input{
width:70%;padding:5px;
}
.chat button{
width:30%;background:cyan;border:none;
}

/* GALERIA */
.galeria{
padding:40px;display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}
.galeria img{
width:100%;border-radius:15px;border:2px solid cyan;
}
.galeria img:hover{
transform:scale(1.08);box-shadow:0 0 30px cyan;
}

/* FOOTER */
footer{text-align:center;padding:20px;border-top:1px solid cyan;color:#777;}
</style>
</head>

<body>

<div id="loader">🚛 Cargando ROAD KINGS...</div>

<canvas id="particles"></canvas>

<header>
<img src="logo.png">
</header>

<section class="hero">
<h1 id="titulo">🔥 ROAD KINGS 🔥</h1>

<a class="btn discord" href="https://discord.com/invite/PCm5HqpRQ5" target="_blank">💬 Discord</a>
<a class="btn telegram" href="https://t.me/BrpqyY6nIYc1MDEx" target="_blank">📲 Telegram</a>
<button class="btn donar" onclick="donar()">💰 Donar</button>
</section>

<!-- LOGIN -->
<div class="login-box">
<h2>🎮 Iniciar sesión</h2>
<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div id="userPanel" style="text-align:center;">
<h3>Bienvenido <span id="nombreUser"></span> 🚛</h3>
</div>

<!-- GALERIA -->
<section class="galeria">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
</section>

<footer>
© 2026 ROAD KINGS 10 | WORLD
</footer>

<!-- CHAT -->
<div class="chat">
<div class="chat-messages" id="chatBox"></div>
<input type="text" id="msg">
<button onclick="sendMsg()">Enviar</button>
</div>

<script>
// LOGIN LOCAL
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u && p){
localStorage.setItem("user",u);
document.getElementById("nombreUser").innerText=u;
document.getElementById("userPanel").style.display="block";
}
}

// CHAT SIMPLE
function sendMsg(){
let msg=document.getElementById("msg").value;
let box=document.getElementById("chatBox");

if(msg){
box.innerHTML+="<div>"+msg+"</div>";
document.getElementById("msg").value="";
box.scrollTop=box.scrollHeight;
}
}

// DONAR
function donar(){
alert("💰 Pronto pagos con Nequi / PayPal");
}

// PARTICULAS
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speedY:Math.random()*1
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.y+=p.speedY;
if(p.y>canvas.height)p.y=0;
ctx.fillStyle="cyan";
ctx.fillRect(p.x,p.y,p.size,p.size);
});
requestAnimationFrame(animate);
}
animate();

// TEXTO CAMBIANTE
const textos=["🚛 ROAD KINGS","🎮 GAMING PRO","🔥 DOMINA LA CARRETERA"];
let i=0;
setInterval(()=>{
document.getElementById("titulo").innerText=textos[i];
i=(i+1)%textos.length;
},2000);
</script>

</body>
</html>
